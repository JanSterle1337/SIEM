version: 0.7
index_id: ocsf-events
doc_mapping:
  mode: dynamic
  field_mappings:
    - name: class_uid
      type: u64
      fast: true
    - name: severity_id
      type: u64
      fast: true
    - name: time
      type: datetime
      input_formats: ["rfc3339", "unix_timestamp"]
      fast: true
    - name: trace_id
      type: text
      tokenizer: default
      fast: true
    - name: status
      type: text
      tokenizer: default
      fast: true
    - name: src_endpoint
      type: json
    - name: dst_endpoint
      type: json
    - name: device
      type: json
    - name: process
      type: json
    - name: http_request
      type: json
    - name: http_response
      type: json
    - name: api
      type: json
    - name: user
      type: json
    - name: metadata
      type: json
    - name: message
      type: text
      tokenizer: default

search_settings:
  default_search_fields: ["message", "trace_id", "src_endpoint.ip", "device.hostname", "user.name", "http_request.url.path", "api.endpoint"]
