services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --mode
      - dev-container
    ports:
      - "19092:19092"
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 10s
      retries: 5

  redpanda-provisioner:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    restart: "no"
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        BROKERS="redpanda:9092"

        TOPICS="
        ocsf-events
        metrics-raw
        ground-truth-events
        siem-alerts
        raw-api
        raw-auth
        raw-firewall
        raw-syslog
        raw-nginx
        "

        echo "Deleting old topics if they exist..."

        rpk topic delete $$TOPICS --brokers "$$BROKERS" || true

        echo "Waiting for topic deletion to settle..."
        sleep 3

        echo "Creating fresh topics..."

        for topic in $$TOPICS; do
          echo "Creating topic: $$topic"
          rpk topic create "$$topic" --brokers "$$BROKERS" || true
        done

        echo "Current topics:"
        rpk topic list --brokers "$$BROKERS"

        echo "Redpanda topics recreated."

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  vector:
    image: timberio/vector:0.34.1-debian
    container_name: vector
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-provisioner:
        condition: service_completed_successfully
    volumes:
      - ./configs/vector.yaml:/etc/vector/vector.yaml:ro
      - ./scripts/data:/var/log/siem:ro
      - vector_data:/var/lib/vector
    environment:
      - VECTOR_CONFIG=/etc/vector/vector.yaml
    restart: on-failure

  quickwit:
    image: quickwit/quickwit
    container_name: quickwit
    volumes:
      - ./qw_data:/quickwit/qwdata
    ports:
      - "7280:7280"
    command: ["run"]
    restart: always

  rust-api:
    image: siem-rust-api:local
    container_name: rust-api
    command: ["/usr/local/bin/api"]
    depends_on:
      - quickwit
    environment:
      QUICKWIT_URL: http://quickwit:7280
      KAFKA_BROKERS: redpanda:9092
      SERVER_PORT: "3000"
    ports:
      - "3000:3000"
    restart: on-failure

  rust-quickwit-worker:
    image: siem-rust-api:local
    container_name: rust-quickwit-worker
    command: ["/usr/local/bin/quickwit_worker"]
    depends_on:
      redpanda-provisioner:
        condition: service_completed_successfully
      quickwit:
        condition: service_started
    environment:
      QUICKWIT_URL: http://quickwit:7280
      KAFKA_BROKERS: redpanda:9092
    restart: on-failure

  rust-parquet-worker:
    image: siem-rust-api:local
    container_name: rust-parquet-worker
    command: ["/usr/local/bin/parquet_worker"]
    depends_on:
      redpanda-provisioner:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: redpanda:9092
      PARQUET_STORAGE_PATH: /cold-storage
    volumes:
      - parquet_data:/cold-storage
    restart: on-failure

  dashboard-dev:
    image: node:24-bookworm-slim
    container_name: dashboard-dev
    working_dir: /app
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 1000"
    depends_on:
      - rust-api
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./src/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    restart: on-failure

volumes:
  vector_data:
  redpanda_data:
  parquet_data:
  dashboard_node_modules:
